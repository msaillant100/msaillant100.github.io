<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>CHCC</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@300..700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
   <link rel="stylesheet" type="text/css" href="CSS/styles.css">

	<style>
	  .hero {
	    padding: 0 40px 40px 40px;
	  }
	  .checkout-title {
	    font-size: 60px;
	    font-weight: 700;
	    color: #30383a;
	    text-align: center;
	    text-decoration: underline;
	    justify-content: center;
	    padding-top: 40px;
	    padding-bottom: 16px;
	    border-bottom: 1px solid #30383a;
	    margin-bottom: 40px;
	  }
	  .checkout-title img {
	    height: 70px;
	  }
	  .checkout-body {
	    display: grid;
	    grid-template-columns: 1fr 1px 1fr;
	    gap: 40px;
	    margin-bottom: 40px;
	    align-items: start;
	  }
	  .checkout-divider {
	    background-color: #30383a;
	    min-height: 300px;
	  }
	  .section-title {
	    font-size: 36px;
	    color: #30383a;
	    margin-bottom: 24px;
	  }
	  .field-group {
	    display: grid;
	    grid-template-columns: 1fr 1fr;
	    gap: 16px 24px;
	    margin-bottom: 16px;
	  }
	  .field label {
	    display: block;
	    font-size: 24px;
	    color: #30383a;
	    margin-bottom: 8px;
	  }
	  .field input {
	    width: 100%;
	    border: 1.5px solid #30383a;
	    border-radius: 8px;
	    padding: 12px;
	    font-family: "Comfortaa", sans-serif;
	    font-size: 14px;
	    color: #30383a;
	    outline: none;
	  }
	  .field input:focus {
	    border-color: #59c9ab;
	  }
	  .card-box {
	    border: 1.5px solid #30383a;
	    border-radius: 12px;
	    overflow: hidden;
	    margin-top: 64px;
	  }
	  .card-number {
	    padding: 20px;
	    border-bottom: 1.5px solid #30383a;
	  }
	  .card-number input {
	    width: 100%;
	    border: none;
	    outline: none;
	    font-family: "Comfortaa", sans-serif;
	    font-size: 14px;
	    color: #30383a;
	    text-align: center;
	  }
	  .card-bottom {
	    display: grid;
	    grid-template-columns: 1fr 1fr;
	  }
	  .card-bottom input {
	    border: none;
	    outline: none;
	    font-family: "Comfortaa", sans-serif;
	    font-size: 14px;
	    color: #30383a;
	    text-align: center;
	    padding: 20px;
	    width: 100%;
	  }
	  .card-bottom input:first-child {
	    border-right: 1.5px solid #30383a;
	  }
	  .donate-now-btn {
	    background-color: #59c9ab;
	    color: #ffffff;
	    font-family: "Comfortaa", sans-serif;
	    font-size: 20px;
	    font-weight: 600;
	    border-radius: 30px;
	    padding: 14px 60px;
	    display: block;
	    margin: 0 auto;
	    width: fit-content;
	  }
	  .donate-now-btn:hover {
	    background-color: #30383a;
	    color: #ffffff;
	  }
	</style>

	</head>
		<body>
	<div class="container-fluid header">
	      <nav class="navbar w-100">
	        <a href="index.html">
	          <img src="images/CHCC_Logo.svg" alt="CHCC Logo">
	        </a>
	        <ul class="navbar-nav ms-auto d-flex flex-row gap-4">
	          <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
	          <li class="nav-item"><a class="nav-link" href="#">About</a></li>
	          <li class="nav-item"><a class="nav-link" href="#">Adopt</a></li>
	          <li class="nav-item"><a class="nav-link" href="donate.html">Donate</a></li>
	          <li class="nav-item"><a class="nav-link" href="#">Shop</a></li>
	        </ul>
	        <a href="#" class="btn book-btn">Book Now</a>
	      </nav>
    </div>

  
    <div class="container-fluid hero">

      <div class="checkout-title">
        <img src="images/CHCC_Logo.svg" alt="CHCC Logo">Checkout
      </div>

      <div class="checkout-body">

        <!-- Left: Donor Details -->
        <div>
          <p class="section-title">Donor Details</p>
          <div class="field-group">
            <div class="field">
              <label for="email">Email</label>
              <input type="email" id="email" placeholder="">
            </div>
            <div class="field">
              <label for="phone">Phone</label>
              <input type="tel" id="phone" placeholder="">
            </div>
            <div class="field">
              <label for="firstname">First Name</label>
              <input type="text" id="firstname" placeholder="">
            </div>
            <div class="field">
              <label for="lastname">Last Name</label>
              <input type="text" id="lastname" placeholder="">
            </div>
          </div>
        </div>

        <!-- Divider -->
        <div class="checkout-divider"></div>

        <!-- Right: Payment -->
        <div>
          <p class="section-title">Payment</p>
          <div class="card-box">
            <div class="card-number">
              <input type="text" placeholder="Card Number" maxlength="19">
            </div>
            <div class="card-bottom">
              <input type="text" placeholder="CVV" maxlength="4">
              <input type="text" placeholder="MM/YY" maxlength="5">
            </div>
          </div>
        </div>

      </div>

      <a href="payment_details.html" class="btn donate-now-btn">Donate Now →</a>

    </div>

    <div class="container-fluid footer">
      <div class="row">
        <div class="col">info@cypresshillscatcafe.com | (999) 999-9999 | 19-05 Atlantic Ave, Brooklyn, NY, 11207</div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  </body>
</html>
